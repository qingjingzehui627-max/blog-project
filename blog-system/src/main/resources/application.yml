spring:
  config:
    import: optional:classpath:application-local-secrets.yml
  datasource:
    url: jdbc:mysql://localhost:3306/blog?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&useUnicode=true
    username: root
    password: admin
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.blog.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    banner: false

server:
  port: 8080

ai:
  enabled: true
  provider: custom
  base-url: https://api.xiaokuizi.online/v1
  api-key: ""
  model: gpt-5.4
  models:
    - gpt-5.4
    - gpt-5.3-codex
    - gpt-5.5
    - gpt-image-2
  system-prompt: 你是 QingJingZe 博客网站的智能助手，请用简洁、专业、友好的中文回答用户问题，并优先结合博客创作、开发、运维、学习建议等场景提供帮助。
  temperature: 0.7
  daily-limit: 10
  max-history: 10
  timeout-ms: 30000
  news-summary:
    enabled: true
    auto-enabled: true
    auto-top-limit: 10
    daily-limit: 50
    cron: 0 40 6 * * ?
    zone: Asia/Shanghai
    temperature: 0.3
    content-max-length: 2000
    max-retries: 1
    prompt-version: news-summary-v1

guardian:
  enabled: true
  base-url: https://content.guardianapis.com
  # Guardian API Key 建议放在 application-local-secrets.yml 中
  api-key: ""
  timeout-ms: 20000
  page-size: 50
  top-limit: 100
  max-pages-per-query: 2
  # 单次请求之间的间隔，单位毫秒
  request-interval-ms: 1200
  # 定时任务 cron 表达式，当前表示每天 06:10 执行
  cron: 0 10 6 * * ?
  # 定时任务执行时区
  zone: Asia/Shanghai
  # 抓取日期偏移量，-1 表示抓取前一天新闻
  fetch-offset-days: -1
  default-category-code: GENERAL_TECH
  default-category-name: 科技综合
  sections:
    - technology
    - science
    - business
  queries:
    - artificial intelligence
    - machine learning
    - OpenAI
    - Anthropic
    - Nvidia
    - technology

newsapi:
  enabled: false
  base-url: https://newsapi.org/v2
  # NewsAPI Key 建议放在 application-local-secrets.yml 中
  api-key: ""
  timeout-ms: 20000
  page-size: 100
  top-limit: 100
  max-pages-per-query: 1
  request-interval-ms: 1200
  language: en
  sort-by: publishedAt
  domains:
    - techcrunch.com
    - thenextweb.com
    - theverge.com
    - wired.com
    - arstechnica.com
  queries:
    - artificial intelligence
    - machine learning
    - OpenAI
    - Anthropic
    - Nvidia
    - technology

currents:
  enabled: true
  base-url: https://api.currentsapi.services/v1
  # Currents API Key 建议放在 application-local-secrets.yml 中
  api-key: ""
  timeout-ms: 20000
  page-size: 30
  top-limit: 100
  max-pages-per-query: 2
  request-interval-ms: 1200
  language: en
  category: science_technology
  keywords:
    - artificial intelligence
    - machine learning
    - OpenAI
    - Anthropic
    - Nvidia
    - technology

rss:
  enabled: true
  timeout-ms: 15000
  request-interval-ms: 800
  top-limit: 100
  default-language: en
  feeds:
    - https://techcrunch.com/feed/
    - https://www.theverge.com/rss/index.xml
    - https://www.wired.com/feed/rss
    - https://feeds.arstechnica.com/arstechnica/technology-lab

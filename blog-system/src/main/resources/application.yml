spring:
  datasource:
    url: jdbc:mysql://localhost:3306/blog?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&useUnicode=true
    username: root
    password: admin
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.blog.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    banner: false

server:
  port: 8080

ai:
  enabled: true
  provider: custom
  base-url: https://api.xiaokuizi.online/v1
  api-key: ${OPENAI_API_KEY}
  model: gpt-5.4
  models:
    - gpt-5.4
    - gpt-5.3-codex
    - gpt-5.5
    - gpt-image-2
  system-prompt: 你是 QingJingZe 博客网站的智能助手，请用简洁、专业、友好的中文回答用户问题，并优先结合博客创作、开发、运维、学习建议等场景提供帮助。
  temperature: 0.7
  daily-limit: 10
  max-history: 10
  timeout-ms: 30000
